<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financeiro</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

    <div class="container">
        <h2>Simulador FlowIT</h2>
        <p class="subtitle">Descubra quanto o "achismo" está custando para a sua loja.</p>

        <div class="formulario">
            <label for="iAluguel">Valor do Aluguel Mensal Total (R$):</label>
            <input type="number" id="iAluguel" placeholder="Ex: 30000">
        </div>


        <div class="formulario">
            <label for="iCorredores">Quantidade Total de Corredores (Setores):</label>
            <input type="number" id="iCorredores" placeholder="Ex: 15">
        </div>

        <div class="formulario">
            <label for="iFaturamento">Faturamento Mensal da Loja (R$):</label>
            <input type="number" id="iFaturamento" placeholder="Ex: 600000">
        </div>

        <button onclick="calcularROI()">Calcular Oportunidade Oculta</button>


    </div>

</body>
</html>
